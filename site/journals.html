<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Summer Camp 2026 Journals — Happy English Club</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230a1628'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='32' fill='%23cdb277' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>

  <nav class="flex items-center justify-between px-6 md:px-12 py-6 max-w-7xl mx-auto">
    <a href="./index.html" class="flex items-center gap-3 text-ink">
      <span class="font-display text-xl tracking-wide">HEC</span>
      <span class="hidden md:inline text-[0.65rem] tracking-[0.28em] uppercase opacity-70">Happy English Club · Hà Nội</span>
    </a>
    <button id="langToggle"
            class="text-[0.7rem] tracking-[0.25em] uppercase text-ink border border-ink/30 rounded-full px-4 py-1.5 hover:bg-ink/5 transition"
            aria-label="Switch language">VI</button>
  </nav>

  <header class="max-w-7xl mx-auto px-6 md:px-12 pt-16 md:pt-28 pb-16 md:pb-24">
    <p class="kicker reveal is-visible" data-i18n="indexKicker"></p>
    <h1 class="font-display font-[340] text-[clamp(2.8rem,7vw,5.5rem)] leading-[1.05] mt-4 tracking-tight reveal is-visible" data-i18n="indexTitle"></h1>
    <p class="mt-6 max-w-xl text-ink-soft text-lg reveal is-visible" data-i18n="indexSub"></p>
    <hr class="hairline mt-16" />
  </header>

  <main class="max-w-7xl mx-auto px-6 md:px-12 pb-24">
    <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-5" id="studentGrid"></div>
  </main>

  <footer class="bg-ink text-ivory/70">
    <div class="max-w-7xl mx-auto px-6 md:px-12 py-14 flex flex-col md:flex-row justify-between gap-8">
      <div>
        <p class="font-display text-2xl text-ivory">Happy English Club</p>
        <p class="text-sm mt-2 max-w-sm" data-i18n="footerTag"></p>
      </div>
      <div class="text-sm space-y-1 md:text-right">
        <p>Đống Đa · Hà Nội</p>
        <p><a href="https://hanoienglish.vip" class="underline decoration-(--color-gold-soft) underline-offset-4 hover:text-ivory transition">hanoienglish.vip</a></p>
        <p class="text-xs opacity-60 mt-4" data-i18n="footerNote"></p>
      </div>
    </div>
  </footer>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
