<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Summer Journal — Happy English Club</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='32' fill='%230a1628'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='32' fill='%23cdb277' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./src/styles.css" />
</head>
<body>

  <!-- Top bar -->
  <nav class="fixed top-0 inset-x-0 z-50 flex items-center justify-between px-6 md:px-12 py-5"
       id="topbar">
    <a href="./index.html" class="flex items-center gap-3 text-white transition-colors duration-500" id="brand">
      <span class="font-display text-xl tracking-wide">HEC</span>
      <span class="hidden md:inline text-[0.65rem] tracking-[0.28em] uppercase opacity-80">Happy English Club · Hà Nội</span>
    </a>
    <button id="langToggle"
            class="text-[0.7rem] tracking-[0.25em] uppercase text-white/90 border border-white/40 rounded-full px-4 py-1.5 hover:bg-white/10 transition"
            aria-label="Switch language">VI</button>
  </nav>

  <!-- Hero -->
  <header class="relative h-[100svh] min-h-[560px] overflow-hidden" id="hero">
    <div id="heroMediaWrap" class="absolute inset-0"></div>
    <div class="hero-scrim"></div>
    <div class="relative z-10 h-full flex flex-col justify-end px-6 md:px-12 pb-14 md:pb-20 max-w-7xl mx-auto">
      <p class="kicker !text-white/85 mb-4 reveal" id="heroKicker" data-i18n="heroKicker"></p>
      <h1 class="hero-name reveal" id="studentName"></h1>
      <div class="mt-6 flex flex-wrap items-center gap-x-8 gap-y-2 text-white/80 text-sm reveal" id="heroMeta"></div>
    </div>
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-10 text-white/70 animate-bounce" aria-hidden="true">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 4v16m0 0l-6-6m6 6l6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 md:px-12">

    <!-- Narrative -->
    <section class="py-20 md:py-32 grid md:grid-cols-12 gap-10" id="narrativeSection">
      <div class="md:col-span-4 reveal">
        <p class="section-no"></p>
        <p class="kicker mt-2" data-i18n="narrativeKicker"></p>
      </div>
      <div class="md:col-span-8">
        <h2 class="font-display text-3xl md:text-[2.6rem] leading-snug font-[340] reveal text-balance" id="remarkHeadline"></h2>
        <div class="mt-8 space-y-6 text-[1.05rem] text-ink-soft max-w-2xl" id="remarkBody"></div>
        <p class="mt-10 reveal" id="teacherSignWrap">
          <span class="font-display italic text-xl" id="teacherSign"></span><br>
          <span class="text-xs tracking-[0.2em] uppercase text-ink-soft" data-i18n="teacherRole"></span>
        </p>
        <p class="hidden font-display italic text-xl text-ink-soft/70 max-w-2xl" id="remarksPending" data-i18n="pendingRemarks"></p>
      </div>
    </section>

    <hr class="hairline" />

    <!-- Interview: the student in their own words -->
    <section class="py-20 md:py-28" id="interviewSection">
      <div class="flex items-baseline gap-6 mb-12 reveal">
        <p class="section-no"></p>
        <p class="kicker" data-i18n="interviewKicker"></p>
      </div>
      <div class="grid gap-6" id="interviewGrid"></div>
    </section>

    <!-- Strengths (IB learner profile-inspired) -->
    <section class="py-20 md:py-28" id="strengthsSection">
      <div class="flex items-baseline gap-6 mb-12 reveal">
        <p class="section-no"></p>
        <p class="kicker" data-i18n="strengthsKicker"></p>
      </div>
      <div class="grid md:grid-cols-3 gap-5" id="strengthCards"></div>
    </section>

    <!-- Stat band -->
    <section class="py-14 md:py-16 border-y border-(--color-hairline)" id="statBand">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-10 text-center" id="statGrid"></div>
    </section>

    <!-- Gallery -->
    <section class="py-20 md:py-28" id="gallerySection">
      <div class="flex items-baseline justify-between mb-12 reveal">
        <div class="flex items-baseline gap-6">
          <p class="section-no"></p>
          <p class="kicker" data-i18n="galleryKicker"></p>
        </div>
        <p class="text-xs tracking-[0.15em] uppercase text-ink-soft hidden md:block" id="galleryCount"></p>
      </div>
      <div class="masonry" id="gallery"></div>
    </section>

    <hr class="hairline" />

    <!-- The path ahead -->
    <section class="py-20 md:py-32 grid md:grid-cols-12 gap-10" id="nextSection">
      <div class="md:col-span-4 reveal">
        <p class="section-no"></p>
        <p class="kicker mt-2" data-i18n="nextKicker"></p>
      </div>
      <div class="md:col-span-8 reveal">
        <div class="text-[1.05rem] text-ink-soft max-w-2xl space-y-6" id="nextSteps"></div>
        <a href="https://hanoienglish.vip" target="_blank" rel="noopener" class="btn-ghost mt-10" data-i18n="cta"></a>
      </div>
    </section>
  </main>

  <footer class="bg-ink text-ivory/70">
    <div class="max-w-7xl mx-auto px-6 md:px-12 py-14 flex flex-col md:flex-row justify-between gap-8">
      <div>
        <p class="font-display text-2xl text-ivory">Happy English Club</p>
        <p class="text-sm mt-2 max-w-sm" data-i18n="footerTag"></p>
      </div>
      <div class="text-sm space-y-1 md:text-right">
        <p>Đống Đa · Hà Nội</p>
        <p><a href="https://hanoienglish.vip" class="underline decoration-(--color-gold-soft) underline-offset-4 hover:text-ivory transition">hanoienglish.vip</a></p>
        <p class="text-xs opacity-60 mt-4" data-i18n="footerNote"></p>
      </div>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="absolute top-6 right-8 text-white/80 hover:text-white text-3xl leading-none" id="lightboxClose" aria-label="Close">×</button>
    <div id="lightboxContent"></div>
  </div>

  <script type="module" src="./src/student.js"></script>
</body>
</html>
